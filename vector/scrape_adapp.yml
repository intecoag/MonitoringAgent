api:
  enabled: true
  address: 0.0.0.0:8686
sources:
  vector_logs:
    type: internal_logs
  docker:
    type: docker_logs
  # host_metrics:
  #   type: host_metrics
  #   scrape_interval_secs: 60
  #   namespace: 'node'
  vector_metrics:
    type: internal_metrics
    scrape_interval_secs: 60
  prometheus_scrape:
    type: prometheus_scrape
    endpoints:
      - http://docker-exporter:9487/metrics
    scrape_interval_secs: 60
    instance_tag: job
transforms:
  msg_parser:
    type: remap
    inputs: [docker, vector_logs]
    source: |
      .message = parse_json(.message) ?? .message
      .instance = "adapp-vm"
  add_labels_metrics:
    type: remap
    inputs: [vector_metrics, prometheus_scrape]
    source: |
      .tags.instance = "adapp-vm"
sinks:
  elasticsearch:
    type: elasticsearch
    inputs: [msg_parser]
    endpoints: [https://logs.monitoring.inteco.ch/insert/elasticsearch/]
    mode: bulk
    api_version: v8
    compression: gzip
    healthcheck:
      enabled: false
    request:
      headers:
        VL-Stream-Fields: source_type,label.com.docker.compose.service
        VL-Time-Field: timestamp
        VL-Msg-Field: message,msg,_msg,message.message,message.log
        AccountID: "0"
        ProjectID: "0"
  victoriametrics:
    type: prometheus_remote_write
    endpoint: https://metrics.monitoring.inteco.ch/api/v1/write
    inputs: [add_labels_metrics]
    healthcheck:
      enabled: false